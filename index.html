<style>

  * { box-sizing:border-box; margin:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; }

  .icon-p { background:#f3e8ff; }
  .icon-b { background:var(--accent-soft); }
  .card-body h2 { font-size:16px; margin-bottom:2px; }

  .badge { display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:4px; margin-left:8px; }
  .badge-y { background:#fef3c7; color:#b45309; }
  .badge-p { background:#f3e8ff; color:#6b21a8; }
