<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内部MTG 議事録</title>
<style>
  :root {
    --bg: #f5f5f3; --card: #ffffff; --ink: #1a1a1a; --ink-sub: #555;
    --ink-mute: #888; --line: #e5e5e0; --accent: #2563eb; --accent-soft: #dbeafe;
    --green: #16a34a; --green-soft: #dcfce7; --green-border: #86efac;
    --amber: #d97706; --amber-soft: #fef3c7;
    --red: #dc2626; --red-soft: #fee2e2;
    --purple: #7c3aed; --purple-soft: #ede9fe;
    --chip: #f1f1ee; --teal: #0d9488; --teal-soft: #ccfbf1;
    --panel-w: 280px;
    --bar-h: 49px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; background: var(--bg); color: var(--ink); line-height: 1.7; font-size: 14px; overflow-x: hidden; }

  /* ── Viewer Bar ── */
  .viewer-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: #fff; border-bottom: 1px solid var(--line); padding: 9px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); height: var(--bar-h); }
  .viewer-type { font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap; }
  .viewer-type .type-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #dbeafe; color: #2563eb; margin-right: 6px; }
  .viewer-select { font-size: 13px; padding: 5px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--chip); color: var(--ink); min-width: 260px; cursor: pointer; }
  .viewer-count { font-size: 12px; color: var(--ink-mute); margin-left: auto; white-space: nowrap; }

  /* ── 3-column Layout ── */
  .page-layout {
    display: grid;
    grid-template-columns: var(--panel-w) 1fr var(--panel-w);
    margin-top: var(--bar-h);
    min-height: calc(100vh - var(--bar-h));
  }

  /* ── Side Panel Base ── */
  .side-panel {
    position: sticky;
    top: var(--bar-h);
    height: calc(100vh - var(--bar-h));
    overflow: hidden;
    background: #fff;
    display: flex;
    flex-direction: column;
  }
  .panel-header { padding: 14px 14px 0; flex-shrink: 0; }
  .panel-title { font-size: 11px; font-weight: 700; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .panel-body { flex: 1; overflow-y: auto; padding: 0 14px 20px; }

  /* ── Left Panel ── */
  .left-panel { border-right: 1px solid var(--line); }

  .upload-zone {
    border: 2px dashed #d0d0cc;
    border-radius: 10px;
    padding: 18px 10px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    color: var(--ink-mute);
    font-size: 12px;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .upload-zone .uz-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  #fileInput { display: none; }

  .diagram-list { display: flex; flex-direction: column; gap: 10px; }
  .diagram-item { position: relative; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; cursor: pointer; }
  .diagram-item img { width: 100%; display: block; }
  .di-del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.55); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; }
  .diagram-item:hover .di-del { opacity: 1; }

  /* Image lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 500; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  .lightbox-close { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; line-height: 1; }

  /* ── Main Content ── */
  .main-content { padding: 28px 28px 80px; min-width: 0; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }

  /* ── Right Panel ── */
  .right-panel { }

  .tab-row { display: flex; gap: 0; border-bottom: 1px solid var(--line); margin: 0 -14px; padding: 0 14px; }
  .tab-btn { font-size: 12px; font-weight: 600; padding: 6px 14px; border: none; background: none; color: var(--ink-mute); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Text memo */
  .text-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 10px 14px 12px; }
  #memoText { flex: 1; width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px; font-family: inherit; font-size: 13px; resize: none; background: #fafaf9; color: var(--ink); line-height: 1.7; min-height: 0; }
  #memoText:focus { outline: none; border-color: var(--accent); background: #fff; }
  .memo-footer { font-size: 11px; color: var(--ink-mute); padding: 5px 2px 0; }

  /* Canvas sketch */
  .sketch-pane { flex: 1; display: none; flex-direction: column; overflow: hidden; padding: 10px 14px 12px; gap: 8px; }
  .sketch-toolbar { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; flex-shrink: 0; }
  .sk-btn { font-size: 11px; padding: 4px 8px; border: 1px solid var(--line); border-radius: 6px; background: var(--chip); cursor: pointer; }
  .sk-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .sk-color { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; }
  .sk-color.active { border-color: var(--ink); }
  .sk-sep { flex: 1; }
  #sketchCanvas { flex: 1; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: crosshair; touch-action: none; min-height: 0; }

  /* ── Right panel flex layout ── */
  .right-panel { display: flex; flex-direction: column; }
  .right-panel .panel-header { padding-bottom: 0; }
  .rp-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  .header { margin-bottom: 24px; }
  .header-tags { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .tag-blue { background: var(--accent-soft); color: var(--accent); }
  .tag-green { background: var(--green-soft); color: var(--green); }
  .tag-purple { background: var(--purple-soft); color: var(--purple); }
  .tag-amber { background: var(--amber-soft); color: var(--amber); }
  .tag-teal { background: var(--teal-soft); color: var(--teal); }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
  .header-sub { font-size: 13px; color: var(--ink-mute); margin-bottom: 14px; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--ink-sub); }
  .meta-item { display: flex; align-items: center; gap: 5px; }

  /* ── Transcript toggle ── */
  .transcript-toggle { margin-top: 12px; }
  .transcript-btn { font-size: 12px; font-weight: 600; color: var(--ink-mute); background: var(--chip); border: 1px solid var(--line); border-radius: 6px; padding: 5px 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .transcript-btn:hover { background: var(--line); }
  /* ── Ref URLs ── */
  .meta-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; align-items: flex-start; }
  .ref-url-section { min-width: 0; }
  .ref-url-list { list-style: none; margin: 0 0 4px; padding: 0; display: flex; flex-direction: column; gap: 3px; }
  .ref-url-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
  .ref-url-link { color: #2563eb; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; display: inline-block; }
  .ref-url-link:hover { text-decoration: underline; }
  .ref-url-del { color: var(--ink-mute); background: none; border: none; cursor: pointer; font-size: 10px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .ref-url-del:hover { color: #dc2626; }
  .ref-url-add-row { display: flex; gap: 4px; align-items: center; }
  .ref-url-label { font-size: 12px; color: var(--ink-mute); white-space: nowrap; flex-shrink: 0; }
  .ref-url-input { font-size: 12px; border: 1px solid var(--line); border-radius: 5px; padding: 4px 8px; background: var(--bg); color: var(--ink); width: 220px; }
  .ref-url-add-btn { font-size: 12px; font-weight: 600; color: var(--ink-mute); background: var(--chip); border: 1px solid var(--line); border-radius: 5px; padding: 4px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .ref-url-add-btn:hover { background: var(--line); }
  .transcript-body { display: none; margin-top: 10px; background: #fafaf9; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; font-size: 12px; line-height: 1.85; color: var(--ink-sub); white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  .transcript-body.open { display: block; }

  /* ── Section ── */
  .section { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* ── Decisions ── */
  .decisions { border-left: 4px solid var(--green); }
  .decision-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .decision-item:last-child { border-bottom: none; padding-bottom: 0; }
  .decision-item:first-child { padding-top: 0; }
  .decision-num { flex-shrink: 0; width: 26px; height: 26px; background: var(--green); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin-top: 1px; }
  .decision-text { font-size: 14px; }
  .decision-text strong { color: var(--green); }

  /* ── Discussion ── */
  .discussion-topic { margin-bottom: 24px; }
  .discussion-topic:last-child { margin-bottom: 0; }
  .topic-header { font-size: 14px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--line); display: flex; align-items: center; gap: 8px; }
  .topic-label { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: var(--chip); color: var(--ink-sub); }

  .utterance { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
  .avatar { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; margin-top: 2px; }
  .bubble { background: #f8f8f6; border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; font-size: 13px; line-height: 1.65; flex: 1; }
  .bubble .speaker-name { font-size: 11px; font-weight: 700; color: var(--ink-mute); margin-bottom: 3px; }
  .bubble ul { padding-left: 16px; margin-top: 6px; }
  .bubble li { margin-bottom: 3px; }

  .conclusion-box { background: var(--green-soft); border: 1px solid var(--green-border); border-radius: 8px; padding: 12px 16px; margin-top: 10px; font-size: 13px; }
  .conclusion-box .cb-label { font-size: 11px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
  .quote-box { background: var(--amber-soft); border-left: 4px solid var(--amber); border-radius: 0 8px 8px 0; padding: 14px 18px; margin: 12px 0; }
  .quote-text { font-size: 14px; font-weight: 600; line-height: 1.6; }
  .quote-attr { font-size: 12px; color: var(--ink-mute); margin-top: 6px; }
  .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
  .comp-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 16px; text-align: center; }
  .comp-card .ci { font-size: 28px; margin-bottom: 6px; }
  .comp-card .ct { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .comp-card .cd { font-size: 12px; color: var(--ink-sub); line-height: 1.5; }
  .flow-diagram { display: flex; align-items: center; gap: 0; margin: 14px 0; flex-wrap: wrap; justify-content: center; }
  .flow-step { background: var(--accent-soft); border: 1px solid #93c5fd; border-radius: 8px; padding: 10px 16px; text-align: center; font-size: 12px; font-weight: 600; color: var(--accent); min-width: 90px; }
  .flow-arrow { font-size: 18px; color: var(--ink-mute); padding: 0 4px; }
  .metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin: 14px 0; }
  .metric-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px; text-align: center; }
  .metric-card .mv { font-size: 26px; font-weight: 800; }
  .metric-card .ml { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
  .person-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
  .person-card { background: #f8f8f6; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .person-card .pn { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .person-card .pnote { font-size: 12px; color: var(--ink-sub); line-height: 1.5; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .benchmark-list { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
  .benchmark-chip { font-size: 12px; padding: 4px 12px; background: var(--chip); border: 1px solid var(--line); border-radius: 20px; }
  .info-label { font-size: 12px; font-weight: 700; color: var(--ink-mute); margin-bottom: 6px; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 10px 0; }
  .data-table th { background: var(--chip); text-align: left; padding: 8px 10px; font-weight: 600; font-size: 12px; color: var(--ink-sub); border-bottom: 2px solid var(--line); }
  .data-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .badge-green { background: var(--green-soft); color: var(--green); }
  .badge-amber { background: var(--amber-soft); color: var(--amber); }
  .badge-blue { background: var(--accent-soft); color: var(--accent); }

  .action-group { margin-bottom: 16px; }
  .action-group:last-child { margin-bottom: 0; }
  .action-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .action-group-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
  .ag-overlap { margin-left: -8px; }
  .action-group-name { font-size: 13px; font-weight: 700; }
  .action-list { list-style: none; }
  .action-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .action-item:last-child { border-bottom: none; }
  .action-check { flex-shrink: 0; width: 18px; height: 18px; border: 2px solid var(--line); border-radius: 4px; margin-top: 2px; }
  .action-text { flex: 1; }
  .action-deadline { flex-shrink: 0; font-size: 12px; color: var(--ink-mute); background: var(--chip); padding: 2px 8px; border-radius: 4px; margin-top: 1px; }

  .next-meeting { background: var(--accent-soft); border: 1px solid #93c5fd; border-radius: 12px; padding: 18px 24px; margin-top: 16px; display: flex; align-items: center; gap: 14px; }
  .next-meeting .nm-icon { font-size: 28px; }
  .next-meeting .nm-info { font-size: 14px; font-weight: 700; color: var(--accent); }
  .next-meeting .nm-sub { font-weight: 400; font-size: 13px; color: var(--ink-sub); display: block; margin-top: 2px; }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--ink-mute); }
  .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="viewer-bar">
  <div class="viewer-type"><span class="type-badge">内部</span>内部MTG 議事録</div>
  <select class="viewer-select" id="dateSelect"></select>
  <div class="viewer-count" id="countLabel"></div>
</div>

<div class="page-layout">

  <!-- ── Left: Diagram Board ── -->
  <aside class="side-panel left-panel">
    <div class="panel-header">
      <div class="panel-title">📌 図解ボード</div>
    </div>
    <div class="panel-body">
      <div class="upload-zone" id="uploadZone">
        <span class="uz-icon">🖼️</span>
        クリックまたはドロップで<br>画像を追加
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div class="diagram-list" id="diagramList"></div>
    </div>
  </aside>

  <!-- ── Center: Minutes ── -->
  <main class="main-content" id="content"></main>

  <!-- ── Right: Notes ── -->
  <aside class="side-panel right-panel">
    <div class="panel-header">
      <div class="panel-title">✏️ メモ・手書き</div>
      <div class="tab-row">
        <button class="tab-btn active" id="tabText" onclick="switchTab('text')">テキスト</button>
        <button class="tab-btn" id="tabSketch" onclick="switchTab('sketch')">手書き</button>
      </div>
    </div>
    <div class="rp-content">
      <div class="text-pane" id="textPane">
        <textarea id="memoText" placeholder="気づいたことや補足メモを自由に…"></textarea>
        <div class="memo-footer">会議ごとに自動保存</div>
      </div>
      <div class="sketch-pane" id="sketchPane">
        <div class="sketch-toolbar">
          <button class="sk-btn active" id="skPen" onclick="setTool('pen')">✏️ ペン</button>
          <button class="sk-btn" id="skEraser" onclick="setTool('eraser')">◻ 消</button>
          <div class="sk-color active" style="background:#1a1a1a" data-c="#1a1a1a" onclick="setColor(this)"></div>
          <div class="sk-color" style="background:#2563eb" data-c="#2563eb" onclick="setColor(this)"></div>
          <div class="sk-color" style="background:#16a34a" data-c="#16a34a" onclick="setColor(this)"></div>
          <div class="sk-color" style="background:#dc2626" data-c="#dc2626" onclick="setColor(this)"></div>
          <div class="sk-color" style="background:#d97706" data-c="#d97706" onclick="setColor(this)"></div>
          <span class="sk-sep"></span>
          <button class="sk-btn" onclick="clearSketch()">🗑</button>
        </div>
        <canvas id="sketchCanvas"></canvas>
      </div>
    </div>
  </aside>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
// ═══ Speaker Config ═══
const SP = {
  "小池": { s: "小", c: "#3b82f6" },
  "兵頭": { s: "兵", c: "#92400e" },
  "宮崎": { s: "宮", c: "#c2410c" },
  "岩崎": { s: "岩", c: "#7c3aed" },
};

// ═══ Render Engine ═══
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══ Reference URLs ═══
function loadRefs(date) {
  try { return JSON.parse(localStorage.getItem(sk(date,'refs')) || '[]'); } catch { return []; }
}
function saveRefs(date, refs) { localStorage.setItem(sk(date,'refs'), JSON.stringify(refs)); }
function renderRefs(date) {
  const listEl = document.getElementById('refList_' + date.replace(/\//g,'-'));
  if (!listEl) return;
  const refs = loadRefs(date);
  listEl.innerHTML = refs.map((r, i) =>
    `<li class="ref-url-item">
      <a class="ref-url-link" href="${r.url}" target="_blank" title="${r.url}">${r.label || r.url}</a>
      <button class="ref-url-del" onclick="deleteRef('${date}',${i})" title="削除">✕</button>
    </li>`
  ).join('');
}
function addRef(date) {
  const key = date.replace(/\//g,'-');
  const input = document.getElementById('refInput_' + key);
  const val = (input.value || '').trim();
  if (!val) return;
  const url = /^https?:\/\//.test(val) ? val : 'https://' + val;
  const refs = loadRefs(date);
  refs.push({ url, label: url });
  saveRefs(date, refs);
  input.value = '';
  renderRefs(date);
}
function deleteRef(date, idx) {
  const refs = loadRefs(date);
  refs.splice(idx, 1);
  saveRefs(date, refs);
  renderRefs(date);
}

function toggleTranscript(btn) {
  const body = btn.nextElementSibling;
  const isOpen = body.classList.toggle('open');
  btn.querySelector('.tr-arrow').textContent = isOpen ? '▲' : '▼';
}

function R(m) {
  const _dk = m.date.replace(/\//g,'-');
  const transcriptBlock = m.transcript ? `
    <div class="transcript-toggle">
      <button class="transcript-btn" onclick="toggleTranscript(this)">
        📝 文字起こしを見る <span class="tr-arrow">▼</span>
      </button>
      <div class="transcript-body">${escHtml(m.transcript)}</div>
    </div>` : '';
  const refBlock = `
    <div class="ref-url-section">
      <ul class="ref-url-list" id="refList_${_dk}"></ul>
      <div class="ref-url-add-row">
        <span class="ref-url-label">🔗 参考URL</span>
        <input class="ref-url-input" id="refInput_${_dk}" type="url" placeholder="https://..." onkeydown="if(event.key==='Enter')addRef('${m.date}')">
        <button class="ref-url-add-btn" onclick="addRef('${m.date}')">＋ 追加</button>
      </div>
    </div>`;
  const transcriptHtml = `<div class="meta-actions">${transcriptBlock}${refBlock}</div>`;
  return `
    <div class="header">
      <div class="header-tags">${m.tags.map(t => `<span class="tag tag-${t[1]}">${t[0]}</span>`).join('')}</div>
      <h1>${m.title}</h1>
      <div class="header-sub">${m.subtitle}</div>
      <div class="meta-row">
        <span class="meta-item">📅 ${m.date}</span>
        <span class="meta-item">👥 ${m.participants}</span>
        <span class="meta-item">🕐 ${m.duration}</span>
        <span class="meta-item">💻 ${m.format || 'Google Meet'}</span>
      </div>
      ${transcriptHtml}
    </div>
    ${rDec(m.decisions)}
    ${rTopics(m.topics)}
    ${rActions(m.actions)}
    ${rNext(m.nextMeeting)}
  `;
}

function rDec(ds) {
  return `<div class="section decisions"><div class="section-title">✅ 決定事項</div>
    ${ds.map((d,i) => `<div class="decision-item"><div class="decision-num">${i+1}</div><div class="decision-text"><strong>${d[0]}</strong>：${d[1]}</div></div>`).join('')}
  </div>`;
}

function rTopics(topics) {
  return `<div class="section"><div class="section-title">💬 議論ハイライト</div>
    ${topics.map((t,i) => `<div class="discussion-topic">
      <div class="topic-header"><span class="topic-label">TOPIC ${i+1}</span>${t.title}</div>
      ${t.blocks.map(rBlock).join('')}
    </div>`).join('')}
  </div>`;
}

function rBlock(b) {
  const type = b[0];
  if (type === 'u') {
    const sp = SP[b[1]] || { s: b[1][0], c: '#666' };
    return `<div class="utterance"><div class="avatar" style="background:${sp.c}">${sp.s}</div>
      <div class="bubble" style="border-left:3px solid ${sp.c}"><div class="speaker-name">${b[1]}</div>${b[2]}</div></div>`;
  }
  if (type === 'conclusion') return `<div class="conclusion-box"><div class="cb-label">結論</div>${b[1]}</div>`;
  if (type === 'quote') return `<div class="quote-box"><div class="quote-text">「${b[1]}」</div><div class="quote-attr">― ${b[2]}</div></div>`;
  if (type === 'comparison') return `<div class="comparison-grid">${b[1].map(c => `<div class="comp-card"><div class="ci">${c[0]}</div><div class="ct">${c[1]}</div><div class="cd">${c[2]}</div></div>`).join('')}</div>`;
  if (type === 'flow') return `<div class="flow-diagram">${b[1].map((s,i) => (i > 0 ? '<div class="flow-arrow">→</div>' : '') + `<div class="flow-step">${s}</div>`).join('')}</div>`;
  if (type === 'metrics') return `<div class="metric-row">${b[1].map(m => `<div class="metric-card"><div class="mv" style="color:${m[2] || 'var(--accent)'}">${m[0]}</div><div class="ml">${m[1]}</div></div>`).join('')}</div>`;
  if (type === 'persons') return `<div class="person-grid">${b[1].map(p => `<div class="person-card"><div class="pn"><span class="dot" style="background:${p[2]}"></span>${p[0]}</div><div class="pnote">${p[1]}</div></div>`).join('')}</div>`;
  if (type === 'benchmarks') return `<div><div class="info-label">${b[2] || 'ベンチマーク'}</div><div class="benchmark-list">${b[1].map(x => `<span class="benchmark-chip">${x}</span>`).join('')}</div></div>`;
  if (type === 'table') return `<table class="data-table"><thead><tr>${b[1].map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${b[2].map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  return '';
}

function rActions(actions) {
  const groups = {};
  actions.forEach(a => {
    const key = a.assignees.map(x => x[0]).join('・');
    if (!groups[key]) groups[key] = { assignees: a.assignees, items: [] };
    groups[key].items.push(a);
  });
  return `<div class="section"><div class="section-title">📋 ネクストアクション</div>
    ${Object.values(groups).map(g => `<div class="action-group">
      <div class="action-group-header">
        ${g.assignees.map((a,i) => { const sp = SP[a[0]] || {s:a[0][0],c:'#666'}; return `<div class="action-group-avatar${i>0?' ag-overlap':''}" style="background:${sp.c}">${sp.s}</div>`; }).join('')}
        <div class="action-group-name">${g.assignees.map(a => a[0]).join('・')}</div>
      </div>
      <ul class="action-list">${g.items.map(a => `<li class="action-item"><div class="action-check"></div><div class="action-text">${a.text}</div>${a.deadline ? `<div class="action-deadline">${a.deadline}</div>` : ''}</li>`).join('')}</ul>
    </div>`).join('')}
  </div>`;
}

function rNext(n) {
  if (!n) return '';
  return `<div class="next-meeting"><div class="nm-icon">📅</div><div class="nm-info">${n.text}<span class="nm-sub">${n.sub || ''}</span></div></div>`;
}

const PFX = 'int_viewer_';
function sk(date, type) { return PFX + type + '_' + date.replace(/\//g,''); }
function saveMemo(date, v) { localStorage.setItem(sk(date,'memo'), v); }
function loadMemo(date) { return localStorage.getItem(sk(date,'memo')) || ''; }
function saveDiagrams(date, imgs) {
  try { localStorage.setItem(sk(date,'diagrams'), JSON.stringify(imgs)); }
  catch(e) { alert('画像が大きすぎて保存できませんでした。\n解像度を下げて再度お試しください。'); }
}
function loadDiagrams(date) {
  try { return JSON.parse(localStorage.getItem(sk(date,'diagrams')) || '[]'); }
  catch(e) { return []; }
}
function saveSketch(date, dataUrl) {
  try { if (dataUrl) localStorage.setItem(sk(date,'sketch'), dataUrl); else localStorage.removeItem(sk(date,'sketch')); }
  catch(e) {}
}
function loadSketch(date) { return localStorage.getItem(sk(date,'sketch')) || null; }

uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));

  e.preventDefault();

  handleFiles(Array.from(e.dataTransfer.files));
});

function handleFiles(files) {
  const imageFiles = files.filter(f => f.type.startsWith('image/'));
  if (!imageFiles.length) return;
  const imgs = loadDiagrams(currentDate);
  let remaining = imageFiles.length;
  imageFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      imgs.push(e.target.result);
      remaining--;
      if (remaining === 0) { saveDiagrams(currentDate, imgs); renderDiagrams(imgs); }
    };
    reader.readAsDataURL(file);
  });
}

// ═══ Canvas Sketch ═══
const canvas = document.getElementById('sketchCanvas');
const ctx = canvas.getContext('2d');
let drawing = false, tool = 'pen', penColor = '#1a1a1a';

function resizeCanvas() {
  const dataUrl = canvas.width > 0 ? canvas.toDataURL() : null;
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  if (dataUrl && dataUrl !== 'data:,') {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = dataUrl;
  }
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}
function draw(e) {
  if (!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  ctx.lineWidth = tool === 'eraser' ? 20 : 2.5;
  ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : penColor;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}
function endDraw() {
  if (!drawing) return;
  drawing = false;
  saveSketch(currentDate, canvas.toDataURL());
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove', draw, {passive:false});
canvas.addEventListener('touchend', endDraw);

function setTool(t) {
  tool = t;
  document.getElementById('skPen').classList.toggle('active', t === 'pen');
  document.getElementById('skEraser').classList.toggle('active', t === 'eraser');
}
function setColor(el) {
  penColor = el.dataset.c;
  document.querySelectorAll('.sk-color').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  setTool('pen');
}
function clearSketch() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  saveSketch(currentDate, null);
}

function show(i) {
  const m = MEETINGS[i];
  currentDate = m.date;
  document.getElementById('content').innerHTML = R(m);
  renderRefs(currentDate);
  memoText.value = loadMemo(currentDate);
  // スキル自動生成の図解（diagramUrl）+ ユーザー追加画像を合わせて表示
  const userImgs = loadDiagrams(currentDate);
  renderDiagramsWithBase(m.diagramUrl || null, userImgs);
  setTimeout(() => {
    resizeCanvas();
    const sketchData = loadSketch(currentDate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (sketchData) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = sketchData;
    }
  }, 30);
}
